<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>CX Client - Servidores</title>
</head>
<body>

<h1>CX Client - Lista de Servidores</h1>

<p>Este link é usado pelo launcher do CX Client para carregar servidores patrocinados.</p>

<script>
async function loadServers() {
    try {
        const response = await fetch('servers.json');
        const data = await response.json();

        console.log("Servidores carregados:", data);

        // Apenas visual (opcional)
        const container = document.createElement("div");

        data.servers.forEach(server => {
            const p = document.createElement("p");
            p.textContent = server.name + " - " + server.ip;
            container.appendChild(p);
        });

        document.body.appendChild(container);

    } catch (error) {
        console.error("Erro ao carregar servidores:", error);
    }
}

loadServers();
</script>

</body>
</html>
